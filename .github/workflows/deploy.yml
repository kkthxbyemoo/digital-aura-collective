name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (static prerender)
        run: bun run build
        env:
          NITRO_PRESET: static

      - name: Find output
        run: |
          echo "=== root ==="
          ls -la
          echo "=== .output (if exists) ==="
          ls -la .output 2>/dev/null || echo 'no .output'
          echo "=== dist (if exists) ==="
          ls -la dist 2>/dev/null || echo 'no dist'
          echo "=== find all index.html ==="
          find . -name 'index.html' -not -path '*/node_modules/*' 2>/dev/null

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
