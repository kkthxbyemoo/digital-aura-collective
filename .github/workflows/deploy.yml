name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          NITRO_PRESET: static

      - name: Generate index.html
        run: |
          JS=$(ls dist/client/assets/*.js | head -1 | xargs basename)
          CSS=$(ls dist/client/assets/*.css | head -1 | xargs basename)
          cat > dist/client/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Digital Aura Collective</title>
              <link rel="stylesheet" href="/assets/$CSS" />
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/assets/$JS"></script>
            </body>
          </html>
          EOF
          echo "Generated index.html with JS=$JS CSS=$CSS"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
